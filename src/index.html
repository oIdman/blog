<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A tiny, zero-dependency personal blog.">
  <title>Tinylogue</title>
  <link rel="stylesheet" href="./css/blog.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="#" aria-label="Home">Tiny<span>logue</span></a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="#">Home</a>
        <a href="#new" id="new-post-link">New Post</a>
        <a href="https://github.com" target="_blank" rel="noopener noreferrer">About</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="article-list" aria-label="Article list"></section>

    <article id="article-view" class="hidden" aria-label="Full article">
      <div id="article-content"></div>
    </article>

    <!-- Editor -->
    <section id="editor" class="hidden" aria-label="Post editor">
      <button class="back-button" type="button" id="editor-back">← Cancel</button>
      <form id="editor-form">
        <div class="editor-field">
          <label for="edit-title">Title</label>
          <input type="text" id="edit-title" placeholder="Post title" required>
        </div>
        <div class="editor-field">
          <label for="edit-excerpt">Excerpt</label>
          <input type="text" id="edit-excerpt" placeholder="Short summary">
        </div>
        <div class="editor-panes">
          <div class="editor-pane">
            <label for="edit-body">Markdown</label>
            <textarea id="edit-body" placeholder="Write your post in Markdown..."></textarea>
          </div>
          <div class="editor-pane">
            <label>Preview</label>
            <div id="edit-preview" class="article-body"></div>
          </div>
        </div>
        <div class="editor-actions">
          <button type="submit" class="btn-primary">Publish</button>
          <button type="button" class="btn-danger hidden" id="btn-delete">Delete</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>Tinylogue · <span id="version"></span></p>
  </footer>

  <script type="module" src="./js/blog.js"></script>
</body>
</html>
